<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D215E" />
      <stop offset="50%" stop-color="#1A1535" />
      <stop offset="100%" stop-color="#0B0B0F" />
    </linearGradient>

    <!-- Vibrant Gradient for the Symbol -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A18" />
      <stop offset="40%" stop-color="#AF5CFF" />
      <stop offset="100%" stop-color="#5C82FF" />
    </linearGradient>

    <!-- 3D Shadow/Bevel internal mask -->
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="15" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.6" />
      <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="#7C5CFF" flood-opacity="0.3" />
    </filter>

    <!-- Inner Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)" stroke="#3E346B" stroke-width="8" />

  <!-- Outer Glow Aura behind the text -->
  <circle cx="256" cy="256" r="160" fill="#7C5CFF" opacity="0.3" filter="blur(60px)" />

  <!-- 3D Text: < \ > -->
  <g filter="url(#shadow3d)">
    <!-- Back Layer (Simulating Depth) -->
    <text x="250" y="325" 
          font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" 
          font-size="240" 
          font-weight="900" 
          text-anchor="middle" 
          letter-spacing="-15"
          fill="#0B0B0F"
          stroke="#403080"
          stroke-width="12">
      &lt;\&gt;
    </text>

    <!-- Front Layer (Vibrant) -->
    <text x="256" y="320" 
          font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" 
          font-size="240" 
          font-weight="900" 
          text-anchor="middle" 
          letter-spacing="-15"
          fill="url(#brandGradient)"
          filter="url(#glow)">
      &lt;\&gt;
    </text>
  </g>
  
  <!-- Subtle Highlight on the top-left edge -->
  <path d="M 128 16 Q 16 16 16 128 L 16 200 Q 16 40 160 40 L 300 40 Q 200 16 128 16 Z" fill="#FFFFFF" opacity="0.1" />
</svg>
